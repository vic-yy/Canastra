<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canastra — Assistente de Reuniões</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <header>
      <h1>Canastra</h1>
      <p class="subtitle">Assistente de Reuniões em Tempo Real</p>
    </header>

    <!-- PAINEL ESQUERDO: Pauta e Tópicos -->
    <div class="layout">
      <section class="panel panel--left">
        <div class="section-block">
          <label class="section-label" for="agenda-input">Pauta da Reunião</label>
          <textarea
            id="agenda-input"
            placeholder="Cole aqui o texto ou pauta da reunião. Cada linha será tratada como um tópico.&#10;&#10;Exemplo:&#10;- Revisão de metas do trimestre&#10;- Alinhamento de entregas&#10;- Próximos passos"
          ></textarea>
          <button id="btn-process" class="btn btn--primary">Processar Pauta</button>
        </div>

        <div class="section-block">
          <div class="section-label-row">
            <label class="section-label">Tópicos</label>
            <button id="btn-clear-topics" class="btn-link">Limpar</button>
          </div>
          <ul id="topics-list" class="topics-list">
            <li class="topics-empty">Nenhum tópico ainda. Processe a pauta acima.</li>
          </ul>
        </div>
      </section>

      <!-- PAINEL DIREITO: Controles e Transcrição -->
      <section class="panel panel--right">
        <div class="section-block">
          <label class="section-label">Controles da Reunião</label>
          <div class="controls">
            <button id="btn-start" class="btn btn--success">
              <span class="btn-icon">🎙</span> Iniciar Reunião
            </button>
            <button id="btn-analyze" class="btn btn--secondary" disabled>
              Analisar Progresso
            </button>
            <button id="btn-end" class="btn btn--danger" disabled>
              Finalizar Reunião
            </button>
            <button id="btn-report" class="btn btn--report" disabled>
              Gerar Relatório
            </button>
          </div>

          <div id="status-bar" class="status-bar status-bar--idle">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text">Aguardando início da reunião</span>
          </div>
        </div>

        <div class="section-block section-block--grow">
          <label class="section-label" for="transcription">Transcrição ao Vivo</label>
          <textarea
            id="transcription"
            readonly
            placeholder="A transcrição aparecerá aqui assim que você iniciar a reunião e começar a falar..."
          ></textarea>
        </div>

        <div id="report-section" class="section-block report-section report-section--hidden">
          <div class="section-label-row">
            <label class="section-label">Relatório da Reunião</label>
            <button id="btn-copy-report" class="btn-link">Copiar</button>
          </div>
          <div id="report-output" class="report-output"></div>
        </div>
      </section>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
